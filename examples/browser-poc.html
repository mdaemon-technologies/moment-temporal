<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moment-temporal — Proof of Concept</title>
  <style>
    :root { --bg: #1e1e2e; --fg: #cdd6f4; --accent: #89b4fa; --green: #a6e3a1; --dim: #6c7086; --surface: #313244; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); padding: 2rem; line-height: 1.6; }
    h1 { color: var(--accent); margin-bottom: .25rem; }
    .subtitle { color: var(--dim); margin-bottom: 2rem; font-size: .95rem; }
    section { background: var(--surface); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    section h2 { color: var(--accent); font-size: 1rem; margin-bottom: .75rem; }
    .row { display: flex; justify-content: space-between; padding: .25rem 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .row:last-child { border-bottom: none; }
    .label { color: var(--dim); font-family: monospace; font-size: .85rem; }
    .value { color: var(--green); font-family: monospace; font-size: .85rem; }
    #status { padding: 1rem; text-align: center; border-radius: 8px; font-weight: 600; margin-top: 1rem; }
    .ok { background: rgba(166,227,161,.15); color: var(--green); }
    .err { background: rgba(243,139,168,.15); color: #f38ba8; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<h1>@mdaemon/moment-temporal</h1>
<p class="subtitle">Drop-in moment replacement backed by the Temporal API. All output below is produced by moment-temporal's Temporal-backed wrapper.</p>

<div class="grid" id="app"></div>
<div id="status">Loading…</div>

<!-- Temporal polyfill (provides globalThis.Temporal for browsers that don't ship it yet) -->
<script src="https://cdn.jsdelivr.net/npm/@aspect-build/temporal-polyfill@0.3.0/dist/global.js"></script>

<!-- moment + moment-timezone (externals — the library expects consumers to provide these) -->
<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-timezone@0.5.46/builds/moment-timezone-with-data.min.js"></script>

<!-- moment-temporal UMD build -->
<script src="../dist/moment-temporal.umd.js"></script>

<script>
(function () {
  const m = window.momentTemporal || window.moment;
  const app = document.getElementById('app');
  const status = document.getElementById('status');

  function addSection(title, rows) {
    const sec = document.createElement('section');
    sec.innerHTML = `<h2>${title}</h2>` +
      rows.map(([l, v]) => `<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`).join('');
    app.appendChild(sec);
  }

  try {
    // 1. Basic creation
    const now = m();
    addSection('Creation & Formatting', [
      ['moment()', now.format('YYYY-MM-DD HH:mm:ss')],
      ['toISOString()', now.toISOString()],
      ['unix()', now.unix()],
      ['moment.utc()', m.utc().format('YYYY-MM-DD HH:mm:ss [UTC]')],
      ['moment.unix(1700000000)', m.unix(1700000000).format('YYYY-MM-DD HH:mm:ss')],
    ]);

    // 2. Getting parts
    const d = m('2025-03-15T14:30:45');
    addSection('Getters', [
      ['year()', d.year()],
      ['month() (0-indexed)', d.month()],
      ['date()', d.date()],
      ['day() (0=Sun)', d.day()],
      ['hour()', d.hour()],
      ['minute()', d.minute()],
      ['second()', d.second()],
    ]);

    // 3. Manipulation
    const base = m('2025-01-15');
    addSection('Manipulation', [
      ['base', base.format('YYYY-MM-DD')],
      ['add(1, "month")', base.clone().add(1, 'month').format('YYYY-MM-DD')],
      ['add(7, "days")', base.clone().add(7, 'days').format('YYYY-MM-DD')],
      ['subtract(1, "year")', base.clone().subtract(1, 'year').format('YYYY-MM-DD')],
      ['startOf("month")', base.clone().startOf('month').format('YYYY-MM-DD')],
      ['endOf("month")', base.clone().endOf('month').format('YYYY-MM-DD HH:mm:ss')],
    ]);

    // 4. Format tokens
    const f = m('2025-12-25T18:05:09');
    addSection('Format Tokens', [
      ['YYYY-MM-DD', f.format('YYYY-MM-DD')],
      ['dddd, MMMM Do YYYY', f.format('dddd, MMMM Do YYYY')],
      ['hh:mm:ss A', f.format('hh:mm:ss A')],
      ['[Today is] dddd', f.format('[Today is] dddd')],
    ]);

    // 5. Comparison
    const a = m('2025-06-01');
    const b = m('2025-09-01');
    addSection('Querying / Comparison', [
      ['a.isBefore(b)', a.isBefore(b)],
      ['a.isAfter(b)', a.isAfter(b)],
      ['a.isSame(a.clone())', a.isSame(a.clone())],
      ['a.isValid()', a.isValid()],
    ]);

    // 6. Diff
    const s = m('2025-01-01'), e = m('2025-07-15');
    addSection('Diff: 2025-01-01 to 2025-07-15', [
      ['diff in days', s.diff(e, 'days')],
      ['diff in months', s.diff(e, 'months')],
      ['diff in years (float)', s.diff(e, 'years', true)],
    ]);

    // 7. Duration
    const dur = m.duration(90, 'minutes');
    addSection('Duration', [
      ["duration(90, 'min').humanize()", dur.humanize()],
      ['.asHours()', dur.asHours()],
      ['.asMinutes()', dur.asMinutes()],
      ["duration('PT1H30M').asMin()", m.duration('PT1H30M').asMinutes()],
    ]);

    // 8. Timezone
    addSection('Timezone', [
      ['tz.guess()', m.tz.guess()],
      ['tz.names() count', m.tz.names().length + ' timezones'],
      ["tz('…', 'America/New_York')", m.tz('2025-06-15T12:00:00', 'America/New_York').format('HH:mm Z')],
      ["tz('…', 'Asia/Tokyo')", m.tz('2025-06-15T12:00:00', 'Asia/Tokyo').format('HH:mm Z')],
    ]);

    // 9. Type checks
    addSection('Type Checks', [
      ['isMoment(moment())', m.isMoment(m())],
      ['isMoment("hello")', m.isMoment('hello')],
      ['isDate(new Date())', m.isDate(new Date())],
      ['isDuration(duration())', m.isDuration(m.duration(1, 'days'))],
    ]);

    // 10. Real-world usage
    const event = m('2025-12-31');
    const diff = m.duration(event.diff(m()));
    const countdown = diff.asMilliseconds() > 0
      ? 'Event in ' + diff.humanize()
      : 'Event was ' + m.duration(m().diff(event)).humanize() + ' ago';
    addSection('Drop-in Usage', [
      ['Same moment code works:', '✔'],
      ['Countdown to 2025-12-31', countdown],
      ['Backend', 'Temporal API'],
      ['moment.version', m.version],
    ]);

    status.className = 'ok';
    status.textContent = '✔ All examples rendered successfully using the Temporal backend';
  } catch (err) {
    status.className = 'err';
    status.textContent = '✘ Error: ' + err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
